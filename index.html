<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POSKRONZ STOREZ — Barang Random, Harga Bersahabat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #25d366;
      --accent-dark: #1da851;
      --text: #f0f0f0;
      --text-muted: #888;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--text); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-count {
      background: var(--accent);
      color: #000;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      background: linear-gradient(180deg, #1a1a1a 0%, var(--bg) 100%);
    }

    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero h1 em {
      color: var(--accent);
      font-style: normal;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 400px;
      margin: 0 auto;
    }

    /* SEARCH */
    .search-wrap {
      max-width: 500px;
      margin: 32px auto 0;
      padding: 0 24px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-muted); }

    /* GRID */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 40px;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-body {
      padding: 14px;
    }

    .card-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-weight: 700;
      font-size: 16px;
      color: var(--accent);
    }

    .btn-order {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-order:hover { background: var(--accent-dark); }

    .tag-habis {
      background: #3a1a1a;
      color: #ff6b6b;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal { transform: scale(1); }

    .modal-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-body { padding: 20px; }

    .modal-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-price {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .btn-wa {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    .btn-wa:hover { background: var(--accent-dark); }

    .btn-close-modal {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
    }

    .btn-close-modal:hover { background: var(--border); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .hero { padding: 40px 16px 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">POSKRONZ<span>STOREZ</span></div>
  <div class="header-right">
    <span class="badge-count" id="productCount">0 produk</span>
  </div>
</header>

<div class="hero">
  <h1>Barang <em>Random</em>,<br>Harga Bersahabat</h1>
  <p>Temukan item unik pilihan kami.</p>
</div>

<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Cari produk..." />
</div>

<div class="container">
  <div class="section-label" id="sectionLabel">Semua Produk</div>
  <div id="productGrid" class="grid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Memuat produk...</p>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-img" id="modalImg">📦</div>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price" id="modalPrice"></div>
      <div class="modal-desc" id="modalDesc"></div>
      <div class="modal-actions">
        <button class="btn-wa" id="btnWA">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.554 4.118 1.526 5.845L.057 23.882l6.198-1.625A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.89 0-3.659-.498-5.191-1.37l-.372-.22-3.857 1.012 1.029-3.76-.241-.386A9.944 9.944 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
          Order via WA
        </button>
        <button class="btn-close-modal" onclick="closeModal()">Tutup</button>
      </div>
    </div>
  </div>
</div>

<footer>
  <a href="admin.html" style="color: var(--text-muted); text-decoration: none; font-size: 12px; opacity: 0.5;">Admin</a>
</footer>

<script>
  const SUPABASE_URL = 'https://ynnumjdvtybyefadukxh.supabase.co'
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlubnVtamR2dHlieWVmYWR1a3hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNDYwMDAsImV4cCI6MjA5NjgyMjAwMH0.ezZwUAnRryAFD5vc45b4l-1WUCE1rwZH4QhowoPZznM'
  const WA_NUMBER = '6282214844429'

  let allProducts = []
  let currentProduct = null

  async function fetchProducts() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/produk?order=id.desc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      })
      const data = await res.json()
      allProducts = data
      renderProducts(data)
      document.getElementById('productCount').textContent = `${data.length} produk`
    } catch (e) {
      document.getElementById('productGrid').innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">⚠️</div>
          <p>Gagal memuat produk</p>
        </div>`
    }
  }

  function formatHarga(n) {
    return 'Rp ' + Number(n).toLocaleString('id-ID')
  }

  function renderProducts(products) {
    const grid = document.getElementById('productGrid')
    const available = products.filter(p => p.tersedia)

    if (available.length === 0) {
      grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">📭</div>
          <p>Belum ada produk tersedia</p>
        </div>`
      return
    }

    grid.innerHTML = available.map(p => `
      <div class="card" onclick="openModal(${p.id})">
        <div class="card-img">
          ${p.foto_url
            ? `<img src="${p.foto_url}" alt="${p.nama}" onerror="this.parentElement.innerHTML='📦'" />`
            : '📦'}
        </div>
        <div class="card-body">
          <div class="card-name">${p.nama}</div>
          <div class="card-desc">${p.deskripsi || 'Tidak ada deskripsi'}</div>
          <div class="card-footer">
            <div class="card-price">${formatHarga(p.harga)}</div>
            <button class="btn-order" onclick="event.stopPropagation(); orderWA(${p.id})">Order</button>
          </div>
        </div>
      </div>
    `).join('')
  }

  function openModal(id) {
    currentProduct = allProducts.find(p => p.id === id)
    if (!currentProduct) return

    document.getElementById('modalName').textContent = currentProduct.nama
    document.getElementById('modalPrice').textContent = formatHarga(currentProduct.harga)
    document.getElementById('modalDesc').textContent = currentProduct.deskripsi || 'Tidak ada deskripsi'

    const imgEl = document.getElementById('modalImg')
    imgEl.innerHTML = currentProduct.foto_url
      ? `<img src="${currentProduct.foto_url}" alt="${currentProduct.nama}" onerror="this.parentElement.innerHTML='📦'" />`
      : '📦'

    document.getElementById('btnWA').onclick = () => orderWA(id)
    document.getElementById('modalOverlay').classList.add('active')
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active')
  }

  function orderWA(id) {
    const p = allProducts.find(x => x.id === id)
    if (!p) return
    const pesan = `Halo, saya mau order:\n\n*${p.nama}*\nHarga: ${formatHarga(p.harga)}\n\nMohon info ketersediaan dan cara pembayarannya ya 🙏`
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(pesan)}`, '_blank')
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal()
  })

  document.getElementById('searchInput').addEventListener('input', function() {
    const q = this.value.toLowerCase()
    const filtered = allProducts.filter(p =>
      p.nama.toLowerCase().includes(q) ||
      (p.deskripsi && p.deskripsi.toLowerCase().includes(q))
    )
    document.getElementById('sectionLabel').textContent = q
      ? `Hasil pencarian "${this.value}"`
      : 'Semua Produk'
    renderProducts(filtered)
  })

  fetchProducts()
</script>
</body>
</html>
